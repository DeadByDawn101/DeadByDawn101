name: Update Hugging Face Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Update README stats
        run: python scripts/update_hf_stats.py
      - name: Track LoRA model history
        run: python scripts/track_hf_model_history.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/hf_model_history.json
          git diff --cached --quiet || git commit -m "chore: refresh hugging face stats"
          git push
